services:
  webgoat:
    image: webgoat/webgoat
    ports:
      - "127.0.0.1:80:8080"
      - "127.0.0.1:8090:9090"
    environment:
      TZ: Europe/Amsterdam
    restart: unless-stopped

  dvwa-db:
    image: mariadb:11
    environment:
      MARIADB_ROOT_PASSWORD: vulnerables
      MARIADB_DATABASE: dvwa
      MARIADB_USER: app
      MARIADB_PASSWORD: vulnerables
    volumes:
      - dvwa-db:/var/lib/mysql
    restart: unless-stopped

  dvwa:
    image: vulnerables/web-dvwa
    depends_on:
      - dvwa-db
    ports:
      - "127.0.0.1:81:80"
    restart: unless-stopped

  bwapp:
    image: hackersploit/bwapp-docker
    ports:
      - "127.0.0.1:82:80"
    restart: unless-stopped

  juiceshop:
    image: bkimminich/juice-shop:snapshot
    ports:
      - "127.0.0.1:83:3000"
    restart: unless-stopped


  linux_priv_lab:
    build:
      context: .
      network: host
    container_name: linux-priv-esc-lab
    hostname: vulnerable-ubuntu
    ports:
      - "2222:22"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    security_opt:
      - no-new-privileges:false

volumes:
  dvwa-db:
